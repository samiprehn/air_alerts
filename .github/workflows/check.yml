name: Check Air Quality

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python check_air.py
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ZIP: ${{ secrets.ZIP }}
          AQI_THRESHOLD: ${{ secrets.AQI_THRESHOLD }}
      - name: Commit seen.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "Update air state" && git push
